name: Build Native Binaries

on:
  push:
    branches: [main, framework-feat]
    paths:
      - packages/native/**
      - .github/workflows/build-native.yml
  pull_request:
    branches: [main]
    paths:
      - packages/native/**
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            triple: linux-x64-gnu
          - os: ubuntu-22.04
            arch: arm64
            triple: linux-arm64-gnu
            cross: true
            rust-target: aarch64-unknown-linux-gnu
          - os: macos-14
            arch: x64
            triple: darwin-x64
            rust-target: x86_64-apple-darwin
          - os: macos-14
            arch: arm64
            triple: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-2022
            arch: x64
            triple: win32-x64-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Linux: install Qt6 via apt
      - name: Install Qt6 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libqt6gui6 \
            libqt6qml6 \
            libqt6quick6 \
            libgl1-mesa-dev \
            libxkbcommon-dev

      # macOS: install Qt6 via Homebrew
      - name: Install Qt6 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6
          echo "QT6_DIR=$(brew --prefix qt@6)" >> $GITHUB_ENV

      # Windows: install Qt6 via chocolatey
      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install qt6 --version=6.8.0 -y
          echo "QT6_DIR=C:\Qt\6.8.0\msvc2022_64" >> $env:GITHUB_ENV

      - name: Install npm deps
        run: npm ci
        working-directory: packages/native

      - name: Build native binary
        run: npx napi build --platform --release
        working-directory: packages/native
        env:
          QT6_DIR: ${{ env.QT6_DIR || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mocha-native-${{ matrix.triple }}
          path: packages/native/mocha-native.*.node
